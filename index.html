<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국 뉴스 큐레이션</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #f8fafc;
    --bg-card: #ffffff;
    --border: #e2e8f0;
    --border-strong: #cbd5e1;
    --text: #0f172a;
    --text-muted: #64748b;
    --text-faint: #94a3b8;
    --accent: #f59e0b;
    --accent-bg: #fffbeb;
    --accent-text: #92400e;
    --accent-soft: #fef3c7;
    --danger: #ef4444;
    --danger-soft: #fecaca;
  }
  [data-theme="dark"] {
    --bg: #0b1220;
    --bg-soft: #131c2e;
    --bg-card: #182236;
    --border: #2a3a55;
    --border-strong: #3a4d6e;
    --text: #e6edf6;
    --text-muted: #94a3b8;
    --text-faint: #64748b;
    --accent: #fbbf24;
    --accent-bg: rgba(251, 191, 36, 0.12);
    --accent-text: #fcd34d;
    --accent-soft: rgba(251, 191, 36, 0.18);
    --danger: #f87171;
    --danger-soft: rgba(248, 113, 113, 0.25);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Pretendard", BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    font-size: 14px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; }
  button { font-family: inherit; cursor: pointer; }
  .app {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 16px;
    max-width: 1400px;
    margin: 0 auto;
    padding: 16px;
    min-height: 100vh;
  }
  header.topbar {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .topbar h1 { margin: 0; font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .topbar .subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .topbar .actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .btn {
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border-strong);
    padding: 6px 11px;
    font-size: 12px;
    border-radius: 6px;
    transition: all 0.12s;
  }
  .btn:hover { background: var(--bg-soft); }
  .btn:active { transform: scale(0.97); }
  .btn[disabled] { opacity: 0.4; cursor: not-allowed; }
  select.btn { padding-right: 24px; }
  main { min-width: 0; }
  .empty-state { padding: 60px 20px; text-align: center; color: var(--text-muted); font-size: 13px; }
  .section { margin-bottom: 18px; }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: var(--bg-soft);
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    user-select: none;
    gap: 8px;
  }
  .section-header:hover { background: var(--border); }
  .section-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600;
    flex: 1; min-width: 0;
  }
  .section-title .toggle {
    font-size: 10px; color: var(--text-muted);
    transition: transform 0.15s;
    width: 10px; display: inline-block;
  }
  .section.collapsed .toggle { transform: rotate(-90deg); }
  .section.collapsed .section-body { display: none; }
  .section-count {
    font-size: 11px; padding: 1px 8px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text-muted);
  }
  .section-controls { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
  .section-sort {
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    color: var(--text-muted);
    padding: 3px 4px 3px 8px;
    font-size: 11px;
    border-radius: 6px;
    font-family: inherit;
    cursor: pointer;
    max-width: 110px;
  }
  .section-sort:hover { color: var(--text); }
  .section-shuffle {
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    color: var(--text-muted);
    padding: 3px 9px;
    font-size: 11px;
    border-radius: 6px;
  }
  .section-shuffle:hover { background: var(--bg-soft); color: var(--text); }
  .section.top-news .section-header {
    background: transparent;
    cursor: default;
    padding: 6px 0;
  }
  .section.top-news .section-header:hover { background: transparent; }
  .section.top-news .section-title .toggle { display: none; }
  .top-news-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.2px;
  }
  .top-news-label .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
  }
  .card {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 4px;
    background: var(--bg-card);
    transition: background 0.1s, border-color 0.1s;
    cursor: pointer;
    user-select: none;
  }
  .card:hover { background: var(--bg-soft); }
  .card.selected {
    border: 2px solid var(--accent);
    background: var(--accent-bg);
    padding: 6px 9px;
  }
  .card.top-news-card { padding: 8px 10px; }
  .card.top-news-card.selected { padding: 7px 9px; }
  .card .check {
    flex-shrink: 0;
    width: 16px; height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
    margin: 0;
    pointer-events: none;
  }
  .card .title {
    flex: 1; min-width: 0;
    font-size: 13px; font-weight: 500;
    line-height: 1.35;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card.top-news-card .title { font-size: 13.5px; }
  .card .meta {
    font-size: 10px;
    color: var(--text-muted);
    flex-shrink: 0;
    white-space: nowrap;
    text-align: right;
  }
  .card .meta .outlets { color: var(--accent-text); font-weight: 500; }
  .card .source-btn {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text-muted);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 5px;
    text-decoration: none;
    line-height: 1;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .card .source-btn:hover {
    background: var(--bg-soft);
    color: var(--text);
    border-color: var(--text-muted);
  }
  .card .delete {
    flex-shrink: 0;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    border: none;
    color: var(--text-faint);
    font-size: 14px;
    border-radius: 4px;
    padding: 0;
    line-height: 1;
    transition: all 0.1s;
  }
  .card .delete:hover { background: var(--danger-soft); color: var(--danger); }

  aside.sidepanel {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    align-self: start;
    position: sticky;
    top: 16px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
  }
  .panel-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .panel-head .title { font-size: 13px; font-weight: 600; }
  .panel-head .badge {
    font-size: 11px;
    padding: 2px 8px;
    background: var(--accent);
    color: white;
    border-radius: 999px;
    font-weight: 600;
  }
  [data-theme="dark"] .panel-head .badge { color: #1a1408; }
  .panel-empty {
    text-align: center; padding: 30px 8px;
    font-size: 12px; color: var(--text-muted);
  }
  .panel-group { margin-bottom: 10px; }
  .panel-cat-label {
    font-size: 9px;
    color: var(--accent-text);
    letter-spacing: 0.5px;
    font-weight: 600;
    background: var(--accent-soft);
    padding: 3px 7px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 4px;
  }
  .panel-item {
    font-size: 11px;
    line-height: 1.35;
    margin-bottom: 6px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    align-items: flex-start;
  }
  .panel-item:last-child { border-bottom: none; margin-bottom: 0; }
  .panel-item .text { flex: 1; }
  .panel-item .title { font-weight: 500; color: var(--text); }
  .panel-item .source { color: var(--text-muted); font-size: 10px; margin-top: 1px; }
  .panel-item .remove {
    flex-shrink: 0;
    background: transparent;
    border: none;
    color: var(--text-faint);
    font-size: 12px;
    padding: 0;
    line-height: 1;
    cursor: pointer;
  }
  .panel-item .remove:hover { color: var(--danger); }
  .panel-actions {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .btn-primary {
    width: 100%; padding: 9px;
    background: var(--text);
    color: var(--bg);
    border: none;
    font-size: 12px; font-weight: 500;
    border-radius: 6px;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-danger {
    width: 100%; padding: 8px;
    background: var(--bg-card);
    color: var(--danger);
    border: 1px solid var(--danger-soft);
    font-size: 11px;
    border-radius: 6px;
  }
  .btn-danger:hover { background: var(--danger-soft); }

  /* ===== MOBILE CART HEADER BUTTON ===== */
  .cart-btn-mobile {
    display: none;
    position: relative;
    padding: 6px 10px !important;
  }
  .cart-badge-inline {
    position: absolute;
    top: -7px;
    right: -7px;
    min-width: 20px;
    height: 20px;
    padding: 0 5px;
    border-radius: 999px;
    background: var(--danger);
    color: white;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--bg);
    line-height: 1;
    animation: badgePop 0.18s ease-out;
  }
  @keyframes badgePop {
    0% { transform: scale(0.6); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ===== MOBILE CART OVERLAY ===== */
  .cart-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    flex-direction: column;
  }
  .cart-overlay.open { display: flex; }
  .cart-overlay-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .cart-overlay-header h2 {
    margin: 0;
    font-size: 17px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cart-overlay-header h2 .badge {
    font-size: 12px;
    padding: 2px 9px;
    background: var(--accent);
    color: white;
    border-radius: 999px;
    font-weight: 600;
  }
  [data-theme="dark"] .cart-overlay-header h2 .badge { color: #1a1408; }
  .cart-close {
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 22px;
    padding: 4px 10px;
    border-radius: 6px;
    line-height: 1;
  }
  .cart-close:active { background: var(--bg-soft); }
  .cart-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
    -webkit-overflow-scrolling: touch;
  }
  .cart-actions {
    flex-shrink: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .cart-overlay .panel-item {
    padding: 10px 0;
    font-size: 13px;
  }
  .cart-overlay .panel-item .title { font-size: 13px; }
  .cart-overlay .panel-item .source { font-size: 11px; }
  .cart-overlay .panel-item .remove {
    font-size: 18px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cart-overlay .panel-cat-label { font-size: 11px; padding: 4px 9px; }
  .cart-overlay .btn-primary { padding: 13px; font-size: 14px; }
  .cart-overlay .btn-danger { padding: 11px; font-size: 13px; }
  .cart-overlay .panel-empty { padding: 60px 8px; font-size: 13px; }

  /* ===== SCRIPT MODAL ===== */
  .script-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 250;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .script-modal.open { display: flex; }
  .script-modal-content {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 800px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .script-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .script-modal-header h2 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
  }
  .script-modal-header .meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .script-modal-close {
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 22px;
    padding: 4px 10px;
    border-radius: 6px;
    line-height: 1;
  }
  .script-modal-close:hover { background: var(--bg-soft); }
  .script-modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px;
    -webkit-overflow-scrolling: touch;
  }
  .script-modal-body textarea {
    width: 100%;
    min-height: 400px;
    padding: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
    line-height: 1.5;
    color: var(--text);
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 6px;
    resize: vertical;
  }
  .script-modal-actions {
    flex-shrink: 0;
    padding: 12px 18px calc(12px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .script-modal-actions .btn-secondary {
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border-strong);
    padding: 9px 18px;
    font-size: 13px;
    border-radius: 6px;
  }
  .script-modal-actions .btn-secondary:hover { background: var(--bg-soft); }
  .script-modal-actions .btn-primary {
    width: auto;
    padding: 9px 22px;
    font-size: 13px;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: var(--bg);
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 12px; font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 1000;
    max-width: 90vw;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

  @media (max-width: 900px) {
    .app {
      grid-template-columns: 1fr;
      padding: 10px;
      padding-bottom: 20px;
    }
    aside.sidepanel { display: none; }
    .cart-btn-mobile { display: inline-flex; align-items: center; }
    .topbar h1 { font-size: 17px; }
    .topbar .subtitle { font-size: 10px; }
    .topbar .actions { gap: 4px; }
    .topbar .actions .btn {
      padding: 6px 9px;
      font-size: 11px;
    }
    .card { padding: 8px 10px; }
    .card .title { font-size: 13px; }
    .card .meta { font-size: 10px; }
    .card .delete {
      width: 28px; height: 28px;
      font-size: 16px;
    }
    .card .check { width: 18px; height: 18px; }
    .card .source-btn {
      padding: 4px 7px;
      font-size: 10px;
    }
    .script-modal { padding: 0; }
    .script-modal-content {
      max-height: 100vh;
      height: 100vh;
      max-width: 100%;
      border-radius: 0;
    }
    .script-modal-body textarea { min-height: 60vh; font-size: 13px; }
  }
  @media (min-width: 901px) {
    .cart-btn-mobile { display: none !important; }
    .cart-overlay { display: none !important; }
  }
</style>
</head>
<body>

<div class="app">

  <header class="topbar">
    <div>
      <h1>한국 뉴스 큐레이션</h1>
      <div class="subtitle" id="subtitle">로딩중...</div>
    </div>
    <div class="actions">
      <select class="btn" id="dateSelect" title="날짜 선택"></select>
      <button class="btn" id="undoBtn" title="되돌리기 (Cmd/Ctrl+Z)" disabled>↶</button>
      <button class="btn" id="shuffleAllBtn" title="전체 셔플">🔀</button>
      <button class="btn" id="themeBtn" title="다크/라이트 모드">🌙</button>
      <button class="btn cart-btn-mobile" id="cartBtnMobile" title="장바구니" aria-label="장바구니">
        🛒
        <span class="cart-badge-inline" id="cartBadgeInline" style="display: none;">0</span>
      </button>
    </div>
  </header>

  <main id="main">
    <div class="empty-state">데이터를 불러오는 중입니다...</div>
  </main>

  <aside class="sidepanel" id="sidepanel">
    <div class="panel-head">
      <div class="title">선택</div>
      <div class="badge" id="selectedCount">0</div>
    </div>
    <div id="panelBody">
      <div class="panel-empty">기사를 선택하면 여기에 모입니다</div>
    </div>
    <div class="panel-actions" id="panelActions" style="display: none;">
      <button class="btn-primary" id="generateBtn">📋 스크립트 생성</button>
      <button class="btn-danger" id="clearBtn">🗑 비우기</button>
    </div>
  </aside>

</div>

<div class="cart-overlay" id="cartOverlay" role="dialog" aria-modal="true">
  <div class="cart-overlay-header">
    <h2>
      장바구니
      <span class="badge" id="cartCount">0</span>
    </h2>
    <button class="cart-close" id="cartClose" aria-label="닫기">✕</button>
  </div>
  <div class="cart-body" id="cartBody">
    <div class="panel-empty">기사를 선택하면 여기에 모입니다</div>
  </div>
  <div class="cart-actions" id="cartActions" style="display: none;">
    <button class="btn-primary" id="generateBtnMobile">📋 스크립트 생성</button>
    <button class="btn-danger" id="clearBtnMobile">🗑 비우기</button>
  </div>
</div>

<div class="script-modal" id="scriptModal" role="dialog" aria-modal="true">
  <div class="script-modal-content">
    <div class="script-modal-header">
      <div>
        <h2>아나운서 스크립트</h2>
        <div class="meta" id="scriptMeta"></div>
      </div>
      <button class="script-modal-close" id="scriptModalClose" aria-label="닫기">✕</button>
    </div>
    <div class="script-modal-body">
      <textarea id="scriptText" readonly spellcheck="false"></textarea>
    </div>
    <div class="script-modal-actions">
      <button class="btn-secondary" id="scriptModalCloseBtn">닫기</button>
      <button class="btn-primary" id="scriptCopyBtn">📋 클립보드 복사</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SORT_OPTIONS = {
  cluster: "중복 보도순",
  newest: "최신순",
  oldest: "오래된순",
};
const TOP_NEWS_KEY = "__top_news__";

const ANCHOR_PROMPT = `다음 기사들을 한국 뉴스 아나운서가 방송에서 읽어주는 스크립트로 다시 써주세요.

요구사항:
- 기사마다 30-60초 분량 (약 90-180자)
- 아나운서 톤: 차분하고 명확하게, "~습니다" 종결
- 첫 문장에 핵심 사실 (Who, What, When, Where)
- 이어서 배경/세부 정보
- 외래어는 한국어로 풀어서 (예: "shutdown" → "가동 중단")
- 감정 표현이나 이모지 제거
- 매체의 의견/추측은 사실로 단정하지 말고 "~로 알려졌습니다", "~로 전해졌습니다" 사용
- 직접 인용은 짧게(15자 이내), 정확한 발언이 필요할 때만
- 카테고리별로 구분해서 출력
- 같은 사건을 여러 매체가 다룬 경우 종합해서 한 꼭지로
- 각 꼭지 끝에 (출처: 매체명) 표기
- 본문에 들어있는 "Key Points", 다른 기사 목록, 광고, 저작권 문구 등은 무시

`;

const STATE = {
  date: null,
  data: null,
  index: null,
  selected: new Set(),
  hidden: new Set(),
  sortBy: {},
  shuffleOrder: {},
  history: [],
  collapsed: new Set(),
};
const MAX_HISTORY = 50;

const el = (id) => document.getElementById(id);
const $key = (suffix) => `news_app_${suffix}_${STATE.date || "default"}`;
const $globalKey = (suffix) => `news_app_g_${suffix}`;

function saveLS() {
  if (!STATE.date) return;
  localStorage.setItem($key("selected"), JSON.stringify([...STATE.selected]));
  localStorage.setItem($key("hidden"), JSON.stringify([...STATE.hidden]));
  localStorage.setItem($key("sortBy"), JSON.stringify(STATE.sortBy));
  localStorage.setItem($key("shuffleOrder"), JSON.stringify(STATE.shuffleOrder));
  localStorage.setItem($key("collapsed"), JSON.stringify([...STATE.collapsed]));
}

function loadLS() {
  STATE.selected = new Set(JSON.parse(localStorage.getItem($key("selected")) || "[]"));
  STATE.hidden = new Set(JSON.parse(localStorage.getItem($key("hidden")) || "[]"));
  STATE.sortBy = JSON.parse(localStorage.getItem($key("sortBy")) || "{}");
  STATE.shuffleOrder = JSON.parse(localStorage.getItem($key("shuffleOrder")) || "{}");
  STATE.collapsed = new Set(JSON.parse(localStorage.getItem($key("collapsed")) || "[]"));
  STATE.history = [];
}

function showToast(msg) {
  const t = el("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove("show"), 1800);
}

function timeAgo(iso) {
  if (!iso) return "";
  try {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return "";
    const diffH = (Date.now() - d.getTime()) / 3600000;
    if (diffH < 0) return "방금";
    if (diffH < 1) return Math.max(1, Math.round(diffH * 60)) + "분";
    if (diffH < 24) return Math.round(diffH) + "시간";
    return Math.round(diffH / 24) + "일";
  } catch (e) { return ""; }
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function tsOf(iso) {
  if (!iso) return 0;
  const t = new Date(iso).getTime();
  return isNaN(t) ? 0 : t;
}

function pushHistory(entry) {
  STATE.history.push(entry);
  if (STATE.history.length > MAX_HISTORY) STATE.history.shift();
  el("undoBtn").disabled = false;
}

function undo() {
  if (STATE.history.length === 0) return;
  const last = STATE.history.pop();
  if (last.type === "delete") {
    STATE.hidden.delete(last.id);
    showToast("삭제 취소: " + (last.title || "").slice(0, 30));
  } else if (last.type === "shuffleSection") {
    if (last.before === null) delete STATE.shuffleOrder[last.key];
    else STATE.shuffleOrder[last.key] = last.before;
    showToast(last.label + " 순서 복원");
  } else if (last.type === "shuffleAll") {
    STATE.shuffleOrder = last.before;
    showToast("셔플 전 순서로 복원");
  } else if (last.type === "clearSelection") {
    STATE.selected = new Set(last.before);
    showToast("선택 복원");
  } else if (last.type === "sortChange") {
    if (last.before === undefined) delete STATE.sortBy[last.key];
    else STATE.sortBy[last.key] = last.before;
    showToast(last.label + " 정렬 복원");
  }
  if (STATE.history.length === 0) el("undoBtn").disabled = true;
  saveLS();
  render();
}

async function init() {
  const savedTheme = localStorage.getItem($globalKey("theme")) || "light";
  document.documentElement.setAttribute("data-theme", savedTheme);
  el("themeBtn").textContent = savedTheme === "dark" ? "☀️" : "🌙";

  try {
    const res = await fetch("./ui_data/index.json");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    STATE.index = await res.json();
  } catch (e) {
    el("main").innerHTML = `<div class="empty-state">
      ❌ ui_data/index.json을 불러올 수 없습니다.<br><br>
      <code style="font-size:11px;">build_ui_data.py</code>를 먼저 실행해주세요.<br>
      <small style="color: var(--text-faint);">(${e.message})</small>
    </div>`;
    return;
  }

  const sel = el("dateSelect");
  sel.innerHTML = "";
  for (const d of STATE.index.dates) {
    const opt = document.createElement("option");
    opt.value = d.date;
    opt.textContent = `${d.date} (${d.total}개)`;
    sel.appendChild(opt);
  }
  STATE.date = STATE.index.latest || (STATE.index.dates[0] && STATE.index.dates[0].date);
  sel.value = STATE.date;
  await loadDate(STATE.date);
}

async function loadDate(date) {
  STATE.date = date;
  loadLS();
  try {
    const res = await fetch(`./ui_data/${date}.json`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    STATE.data = await res.json();
  } catch (e) {
    el("main").innerHTML = `<div class="empty-state">${date} 데이터 로드 실패: ${e.message}</div>`;
    return;
  }
  const validIds = new Set(STATE.data.articles.map(a => a.id));
  STATE.selected = new Set([...STATE.selected].filter(id => validIds.has(id)));
  STATE.hidden = new Set([...STATE.hidden].filter(id => validIds.has(id)));
  saveLS();
  render();
}

function articleById(id) {
  return STATE.data.articles.find(a => a.id === id);
}

function getSortBy(key) {
  return STATE.sortBy[key] || "cluster";
}

function applySorted(ids, sortBy) {
  const arr = ids.map(id => articleById(id)).filter(Boolean);
  if (sortBy === "newest") {
    arr.sort((a, b) => tsOf(b.published) - tsOf(a.published));
  } else if (sortBy === "oldest") {
    arr.sort((a, b) => tsOf(a.published) - tsOf(b.published));
  } else {
    arr.sort((a, b) => {
      const d = (b.cluster_size || 1) - (a.cluster_size || 1);
      if (d !== 0) return d;
      return tsOf(b.published) - tsOf(a.published);
    });
  }
  return arr.map(a => a.id);
}

function getOrderedIds(key, candidateIds) {
  const shuffled = STATE.shuffleOrder[key];
  if (shuffled && shuffled.length === candidateIds.length) {
    const set = new Set(candidateIds);
    if (shuffled.every(id => set.has(id))) return shuffled.slice();
  }
  return applySorted(candidateIds, getSortBy(key));
}

function makeSortDropdown(key, sortBy) {
  const sel = document.createElement("select");
  sel.className = "section-sort";
  sel.title = "정렬";
  for (const [val, label] of Object.entries(SORT_OPTIONS)) {
    const opt = document.createElement("option");
    opt.value = val;
    opt.textContent = label;
    if (val === sortBy) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.addEventListener("click", (e) => e.stopPropagation());
  sel.addEventListener("change", (e) => {
    e.stopPropagation();
    const newVal = e.target.value;
    const before = STATE.sortBy[key];
    STATE.sortBy[key] = newVal;
    if (STATE.shuffleOrder[key]) delete STATE.shuffleOrder[key];
    pushHistory({ type: "sortChange", key, before, label: key === TOP_NEWS_KEY ? "Top News" : key });
    saveLS();
    render();
  });
  return sel;
}

function renderCard(article, isTopNews) {
  const isSelected = STATE.selected.has(article.id);
  const card = document.createElement("div");
  card.className = "card" + (isTopNews ? " top-news-card" : "") + (isSelected ? " selected" : "");
  card.dataset.id = article.id;

  const meta = [];
  if (article.source) meta.push(article.source.slice(0, 10));
  const t = timeAgo(article.published);
  if (t) meta.push(t);
  if (isTopNews) {
    const ci = STATE.data.cluster_info && STATE.data.cluster_info[article.cluster_id];
    if (ci && ci.size >= 2) {
      meta.push(`<span class="outlets">+${ci.size - 1}개</span>`);
    }
  }

  const sourceBtn = article.url
    ? `<a href="${escapeHtml(article.url)}" target="_blank" rel="noopener" class="source-btn" title="원문 보기">🔗 원문</a>`
    : '';

  card.innerHTML = `
    <input type="checkbox" class="check" ${isSelected ? "checked" : ""} aria-label="선택">
    <div class="title" title="${escapeHtml(article.title)}">${escapeHtml(article.title)}</div>
    <div class="meta">${meta.join(" · ")}</div>
    ${sourceBtn}
    <button class="delete" title="숨기기" aria-label="숨기기">✕</button>
  `;

  card.addEventListener("click", (e) => {
    if (e.target.closest(".source-btn")) return;
    if (e.target.closest(".delete")) {
      e.stopPropagation();
      hideCard(article.id, article.title);
      return;
    }
    toggleSelect(article.id);
  });

  return card;
}

function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function buildSectionHeader(opts) {
  const header = document.createElement("div");
  header.className = "section-header";
  if (opts.isTopNews) {
    header.innerHTML = `
      <div class="section-title">
        <div class="top-news-label">
          <span class="dot"></span>
          <span>TOP NEWS · ${opts.count}개</span>
        </div>
      </div>
      <div class="section-controls"></div>
    `;
  } else {
    header.innerHTML = `
      <div class="section-title">
        <span class="toggle">▼</span>
        <span>${escapeHtml(opts.title)}</span>
        <span class="section-count">${opts.count}</span>
      </div>
      <div class="section-controls"></div>
    `;
  }
  const controls = header.querySelector(".section-controls");
  controls.appendChild(makeSortDropdown(opts.key, getSortBy(opts.key)));
  const shuf = document.createElement("button");
  shuf.className = "section-shuffle";
  shuf.title = "이 섹션 셔플";
  shuf.textContent = "🔀";
  shuf.addEventListener("click", (e) => {
    e.stopPropagation();
    shuffleSection(opts.key, opts.title || "Top News");
  });
  controls.appendChild(shuf);
  return header;
}

function render() {
  const s = STATE.data.stats;
  el("subtitle").textContent = `${s.total_articles}개 기사 · 본문 ${s.with_body}개 · 사진 ${s.with_image}개`;

  const main = el("main");
  main.innerHTML = "";

  const topIds = (STATE.data.top_news_ids || []).filter(id => !STATE.hidden.has(id));
  if (topIds.length > 0) {
    const sec = document.createElement("section");
    sec.className = "section top-news";
    const header = buildSectionHeader({
      title: "TOP NEWS",
      count: topIds.length,
      key: TOP_NEWS_KEY,
      isTopNews: true,
    });
    sec.appendChild(header);
    const body = document.createElement("div");
    body.className = "section-body";
    const ordered = getOrderedIds(TOP_NEWS_KEY, topIds);
    for (const id of ordered) {
      const a = articleById(id);
      if (a) body.appendChild(renderCard(a, true));
    }
    sec.appendChild(body);
    main.appendChild(sec);
  }

  for (const cat of STATE.data.categories) {
    const visibleIds = cat.article_ids.filter(id => !STATE.hidden.has(id));
    if (visibleIds.length === 0) continue;

    const isCollapsed = STATE.collapsed.has(cat.name);
    const sec = document.createElement("section");
    sec.className = "section" + (isCollapsed ? " collapsed" : "");
    sec.dataset.cat = cat.name;
    const header = buildSectionHeader({
      title: cat.name,
      count: visibleIds.length,
      key: cat.name,
      isTopNews: false,
    });
    header.addEventListener("click", (e) => {
      if (e.target.closest(".section-controls")) return;
      toggleSection(cat.name);
    });
    sec.appendChild(header);

    const body = document.createElement("div");
    body.className = "section-body";
    const ordered = getOrderedIds(cat.name, visibleIds);
    for (const id of ordered) {
      const a = articleById(id);
      if (a) body.appendChild(renderCard(a, false));
    }
    sec.appendChild(body);
    main.appendChild(sec);
  }

  if (main.children.length === 0) {
    main.innerHTML = `<div class="empty-state">표시할 기사가 없습니다.<br>모두 숨김 처리됐을 수 있습니다.</div>`;
  }

  renderPanel();
  renderCart();
}

function renderPanelInto(bodyEl, actionsEl) {
  const count = STATE.selected.size;
  if (count === 0) {
    bodyEl.innerHTML = `<div class="panel-empty">기사를 선택하면 여기에 모입니다</div>`;
    actionsEl.style.display = "none";
    return;
  }
  actionsEl.style.display = "flex";
  const groups = {};
  for (const id of STATE.selected) {
    const a = articleById(id);
    if (!a) continue;
    const cat = a.category || "기타";
    (groups[cat] ||= []).push(a);
  }
  bodyEl.innerHTML = "";
  const catOrder = STATE.data.categories.map(c => c.name);
  const catNames = Object.keys(groups).sort((a, b) => {
    const ai = catOrder.indexOf(a); const bi = catOrder.indexOf(b);
    return (ai < 0 ? 999 : ai) - (bi < 0 ? 999 : bi);
  });
  for (const cat of catNames) {
    const g = document.createElement("div");
    g.className = "panel-group";
    g.innerHTML = `<div class="panel-cat-label">${escapeHtml(cat)} · ${groups[cat].length}</div>`;
    for (const a of groups[cat]) {
      const item = document.createElement("div");
      item.className = "panel-item";
      item.innerHTML = `
        <div class="text">
          <div class="title">${escapeHtml(a.title)}</div>
          <div class="source">${escapeHtml(a.source || "")}</div>
        </div>
        <button class="remove" data-id="${a.id}" title="해제">✕</button>
      `;
      item.querySelector(".remove").addEventListener("click", () => toggleSelect(a.id));
      g.appendChild(item);
    }
    bodyEl.appendChild(g);
  }
}

function renderPanel() {
  const count = STATE.selected.size;
  el("selectedCount").textContent = count;
  renderPanelInto(el("panelBody"), el("panelActions"));
}

function renderCart() {
  const count = STATE.selected.size;
  el("cartCount").textContent = count;
  const badgeInline = el("cartBadgeInline");
  if (count > 0) {
    const newText = count > 99 ? "99+" : String(count);
    if (badgeInline.textContent !== newText) {
      // 다시 애니메이션 트리거
      badgeInline.style.animation = "none";
      badgeInline.offsetHeight; // reflow
      badgeInline.style.animation = "";
    }
    badgeInline.textContent = newText;
    badgeInline.style.display = "flex";
  } else {
    badgeInline.style.display = "none";
  }
  renderPanelInto(el("cartBody"), el("cartActions"));
}

function toggleSelect(id) {
  if (STATE.selected.has(id)) STATE.selected.delete(id);
  else STATE.selected.add(id);
  saveLS();
  render();
}

function hideCard(id, title) {
  STATE.hidden.add(id);
  STATE.selected.delete(id);
  pushHistory({ type: "delete", id, title });
  saveLS();
  render();
}

function shuffleSection(key, label) {
  let candidateIds;
  if (key === TOP_NEWS_KEY) {
    candidateIds = (STATE.data.top_news_ids || []).filter(id => !STATE.hidden.has(id));
  } else {
    const cat = STATE.data.categories.find(c => c.name === key);
    if (!cat) return;
    candidateIds = cat.article_ids.filter(id => !STATE.hidden.has(id));
  }
  const before = STATE.shuffleOrder[key] ? STATE.shuffleOrder[key].slice() : null;
  STATE.shuffleOrder[key] = shuffle(candidateIds);
  pushHistory({ type: "shuffleSection", key, label, before });
  saveLS();
  render();
}

function shuffleAll() {
  const before = JSON.parse(JSON.stringify(STATE.shuffleOrder));
  for (const cat of STATE.data.categories) {
    const visibleIds = cat.article_ids.filter(id => !STATE.hidden.has(id));
    STATE.shuffleOrder[cat.name] = shuffle(visibleIds);
  }
  const topVisible = (STATE.data.top_news_ids || []).filter(id => !STATE.hidden.has(id));
  STATE.shuffleOrder[TOP_NEWS_KEY] = shuffle(topVisible);
  pushHistory({ type: "shuffleAll", before });
  saveLS();
  render();
}

function toggleSection(name) {
  if (STATE.collapsed.has(name)) STATE.collapsed.delete(name);
  else STATE.collapsed.add(name);
  saveLS();
  render();
}

function buildScriptText() {
  const ids = [...STATE.selected];
  if (ids.length === 0) return null;
  const groups = {};
  for (const id of ids) {
    const a = articleById(id);
    if (!a) continue;
    (groups[a.category || "기타"] ||= []).push(a);
  }

  let text = ANCHOR_PROMPT;
  text += `---\n\n# 선택한 기사 ${ids.length}개 (${STATE.date})\n\n`;

  const catOrder = STATE.data.categories.map(c => c.name);
  const cats = Object.keys(groups).sort((a, b) => {
    const ai = catOrder.indexOf(a); const bi = catOrder.indexOf(b);
    return (ai < 0 ? 999 : ai) - (bi < 0 ? 999 : bi);
  });
  for (const cat of cats) {
    text += `## ${cat}\n\n`;
    for (const a of groups[cat]) {
      text += `### ${a.title}\n`;
      text += `- 출처: ${a.source}\n`;
      text += `- URL: ${a.url}\n`;
      if (a.published) text += `- 발행: ${a.published}\n`;
      if (a.body) text += `\n${a.body.trim()}\n`;
      text += `\n---\n\n`;
    }
  }
  return { text, count: ids.length };
}

function openScriptModal() {
  const result = buildScriptText();
  if (!result) {
    showToast("선택한 기사가 없습니다");
    return;
  }
  el("scriptText").value = result.text;
  el("scriptMeta").textContent = `${result.count}개 기사 · ${STATE.date} · 약 ${result.text.length.toLocaleString()}자`;
  el("cartOverlay").classList.remove("open");
  el("scriptModal").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeScriptModal() {
  el("scriptModal").classList.remove("open");
  document.body.style.overflow = "";
}

function copyScriptText() {
  const text = el("scriptText").value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    showToast("클립보드에 복사됨 → claude.ai에 붙여넣기");
  }).catch(() => {
    el("scriptText").select();
    showToast("선택됨. Ctrl+C로 복사하세요");
  });
}

function clearSelection() {
  if (STATE.selected.size === 0) return;
  if (!confirm(`선택한 ${STATE.selected.size}개를 모두 해제할까요?`)) return;
  pushHistory({ type: "clearSelection", before: [...STATE.selected] });
  STATE.selected.clear();
  saveLS();
  render();
}

function openCart() {
  el("cartOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeCart() {
  el("cartOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

el("dateSelect").addEventListener("change", (e) => loadDate(e.target.value));
el("themeBtn").addEventListener("click", () => {
  const cur = document.documentElement.getAttribute("data-theme");
  const next = cur === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem($globalKey("theme"), next);
  el("themeBtn").textContent = next === "dark" ? "☀️" : "🌙";
});
el("undoBtn").addEventListener("click", undo);
el("shuffleAllBtn").addEventListener("click", shuffleAll);
el("generateBtn").addEventListener("click", openScriptModal);
el("clearBtn").addEventListener("click", clearSelection);
el("generateBtnMobile").addEventListener("click", openScriptModal);
el("clearBtnMobile").addEventListener("click", clearSelection);
el("cartBtnMobile").addEventListener("click", openCart);
el("cartClose").addEventListener("click", closeCart);
el("scriptModalClose").addEventListener("click", closeScriptModal);
el("scriptModalCloseBtn").addEventListener("click", closeScriptModal);
el("scriptCopyBtn").addEventListener("click", copyScriptText);

el("scriptModal").addEventListener("click", (e) => {
  if (e.target.id === "scriptModal") closeScriptModal();
});

document.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "z") {
    e.preventDefault();
    undo();
  }
  if (e.key === "Escape") {
    closeScriptModal();
    closeCart();
  }
});

init();
</script>

</body>
